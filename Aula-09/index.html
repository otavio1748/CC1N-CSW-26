<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Aula-09</title>
</head>
<body>

    <form method="get">


        <div class="login">

        <table border="1">

            <thead>
                <tr>
                    <td>

                        
                        
                        <label for="fname">Nome:</label>
                        <td>

                            <input type="text" id="fname" name="fname" placeholder="Insira seu nome">
                        </td>
                    </td>
                </tr>
                        
                    <tr>
                        <td>
                                <label for="lmail">Email Pessoal:</label>
                            <td>

                                <input type="email" id="lmail" name="lmail">
                            </td>
                        </td>
                    </tr>
                    <tr>
                        <td>
                                <label for="lmail2">Email (patter):</label>
                            <td>
                                
                                <input type="email" id="lmail2" name="lmail2" placeholder="Digite seu email com @">
                            </td>
                        </td>
                    </tr>
                    <tr>
                        <td>

                            <label for="pword">Senha:</label>
                            <td>

                                <input type="text" id="pword" name="pword" placeholder="Insira sua senha">
                            </td>
                        </td>
                    </tr>
                    <tr>
                        <td>

                            <label for="idade">Idade:</label>   
                            <td>

                                <input type="idade" name="idade" id="">
                            </td>
                        </td>
                    </tr>
                    <tr>
                        <td colspan="2"  >
                            
                            <label for="coment">Deixe um comentário:</label>
                            
                            
                            <br>
                            <textarea name="area" id="area" cols="50" rows="10"></textarea>
                        </td>
                    </tr>
                    
                    <br>
                    <br>

                    <tr>
                        <td rowspan="2">

                            <label for="Matéria">Matéria de interesse:</label>
                            <br>
                                <input type="checkbox" name="materia" id="materia">
                                <label for="materia">Backend</label>
                            <br>
                                <input type="checkbox" name="materia2" id="materia2">   
                                <label for="materia2">FrontEnd</label>
                            <br>
                                <input type="checkbox" name="materia3" id="materia3">
                                <label for="materia3">FullStack</label>
                            <br>
                                <td>

                                    <label for="viagem">Tipo de Vigem:</label>
                            
                            <br>    
                                    <input type="radio" name="v1" id="v1">
                                    <label for="ngc">Negócio</label>
                            <br>
                                    
                                    <input type="radio" name="v1" id="v2">
                                    <label for="ngc">Lazer</label>
                            <br>       
                                    <input type="radio" name="v1" id="v3">
                                    <label for="ngc">Turismo</label>
                            <br>        
                                    <input type="radio" name="v1" id="v4">
                                    <label for="ngc">Acadêmico</label> </td>
                                </td>
                           
                            
                        </td>
                    </tr>
                    <br>
                    <br>


                    
                </thead>
                <tbody>
                    <tr>
                        <td>

                            
                        <label for="esp">Esporte favorito:</label>
                        <select name="esp" id="esp">
                            
                            <option value="futebol">Futebol</option>
                            <option value="basquete">Basquete</option>
                            <option value="volei">Vôlei</option>
                            <option value="tenis">Tênis</option>
                            <option value="corrida">Corrida</option>
                        </select>

                        <br>
                        <br>
                        <br>
                        <br>
                        <br>
                        <br>
                        <br>
                        <br>

                        <td>
                             <label for="inv">Investimentos</label>
                            <select name="inv" id="inv">
                                
                        
                                
                        <optgroup label="Baixo Risco">

                            <option value="inv1">Poupança</option>
                            <option value="inv2">CDB</option>
                            <option value="inv3">Tesouro Direto</option>
                        </optgroup>
                       
                      <optgroup label="Médio Risco">

                          <option value="inv4">Fundos Imobiliários</option>
                          <option value="inv5">CDI</option>
                          <option value="inv6">DEBÊNTURES</option>
                        </optgroup>
                        <optgroup label="Alto Risco">

                            <option value="inv7">Criptomoedas</option>
                            <option value="inv8">Ações</option>
                        </optgroup>
                            </select>


                        </td>
                    </td>
                    </tr>

                    </select>
                    <br>
                    <br>
                    
                    <tr>
                        <td>
                            <br>
                            
                            <label for="col">Escolha uma cor:</label>
                            <input type="color" name="color" id="col">
                            
                                
                        </td>

                        <td>
                             <label for="arq">Selecione um arquivo:</label>
                            <input type="file" name="arq" id="arq">
                            <br>
                            <br>
                            <br>
                            <br>
                            <br>
                        </td>
                    </tr>
                    <tr>
                        <td>
                            <label for="dahora">Data e Hora envio:</label>
                            <input type="date" name="data" id="dahora">
                            <br>
                            <br>
                        </td>
                    </tr>
                    
        </tbody>
        <tfoot>

            <br>
            <br>
            <tr>

                <td>
                    <button>Enviar</button>
                </td>
                <td>
                    <button>Limpar</button>
                </td>
            </tr>

        </tfoot>
        </div>
        
    </table>
    </form>
    
    
</body>
</html>
